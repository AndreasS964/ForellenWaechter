; ═══════════════════════════════════════════════════════════
; PlatformIO Project Configuration File (OPTIONAL!)
; ═══════════════════════════════════════════════════════════
;
; ⚠️ EMPFEHLUNG: Nutze Arduino IDE statt PlatformIO!
;    Siehe ARDUINO_IDE_SETUP.md für einfachere Installation.
;
; Diese Datei ist nur für Fortgeschrittene, die PlatformIO
; bevorzugen. Arduino IDE ist einfacher, schneller und stabiler!
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
; ═══════════════════════════════════════════════════════════

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32 @ ^6.4.0
board = esp32dev
framework = arduino

; ========== ENERGIE-OPTIMIERUNG (Off-Grid) ==========
; CPU auf 80MHz für maximale Energie-Effizienz
board_build.f_cpu = 80000000L
board_build.f_flash = 80000000L

; Partitionstabelle (Standard)
board_build.partitions = default.csv

; ========== UPLOAD EINSTELLUNGEN ==========
upload_speed = 921600
monitor_speed = 115200

; ========== BIBLIOTHEKEN ==========
lib_deps =
    ; Temperatursensoren
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0

    ; WebSocket für Live-Updates
    links2004/WebSockets @ ^2.4.1

    ; MQTT (optional)
    knolleary/PubSubClient @ ^2.8

    ; Preferences (Built-in ESP32 Arduino Core >= 2.0.0)
    ; WebServer (Built-in ESP32 Arduino Core >= 2.0.0)
    ; WiFi (Built-in)
    ; ESPmDNS (Built-in)
    ; ArduinoOTA (Built-in)
    ; SD (Built-in)

; ========== BUILD FLAGS ==========
build_flags =
    ; Version
    -D FW_VERSION=\"2.1.0\"
    -D BUILD_DATE=\"${__DATE__}\"

    ; Energie-Optimierungen
    -D ARDUINO_RUNNING_CORE=1
    -D CONFIG_FREERTOS_UNICORE=1

    ; Debug Level (für Production auf None setzen)
    -D CORE_DEBUG_LEVEL=0

    ; Watchdog
    -D CONFIG_ESP_TASK_WDT_TIMEOUT_S=30

; ========== OTA UPDATE ENVIRONMENT ==========
[env:esp32dev-ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = forellenwaechter.local
upload_flags =
    --port=3232
    --auth=forelle2024

; ========== DEBUG ENVIRONMENT ==========
[env:esp32dev-debug]
extends = env:esp32dev
build_type = debug
build_flags =
    ${env:esp32dev.build_flags}
    -D CORE_DEBUG_LEVEL=5
    -D ENABLE_SERIAL_DEBUG=1
monitor_filters =
    esp32_exception_decoder
    time

; ========== PRODUCTION ENVIRONMENT ==========
[env:esp32dev-prod]
extends = env:esp32dev
build_type = release
build_flags =
    ${env:esp32dev.build_flags}
    -D CORE_DEBUG_LEVEL=0
    -D ENABLE_SERIAL_DEBUG=0
    -O2
    -DNDEBUG
